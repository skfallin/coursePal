<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Pal - Edit Course</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <header>
      <div class="header-left">
        <a href="index.html" class="logolink">
          <img src="images/logo.svg" width="100" alt="Course Pal Logo">
          <span class="sitename">Course Pal</span>
        </a>
      </div>
      <div class="header-right">
        <p class="welcome">Welcome admin</p>
        <nav>
          <ul>
            <li><a class="" href="courses.html">All Courses</a></li>
                          <li><a class="" href="index.html">Home</a></li>
              <li><a class="" href="account.html">My Account</a></li>
              <li><a href="index.html">Logout</a></li>
                                      <li><a class="active" href="admin.html">Admin</a></li>
              <li><a class="" href="reports.html">Reports</a></li>
                      </ul>
        </nav>
      </div>
    </header>
    <main class="container">
<section class="narrow">
  <h1>Add course</h1>
  
  <form class="panel" method="get" action="#" data-demo-action="edit-course">
    <label for="name">Course Name</label>
    <input id="name" name="name" type="text" value="" required>

    <label for="category_id">Category</label>
    <select id="category_id" name="category_id" required>
      <option value="">Choose a category</option>
              <option value="4" >
          Cloud Computing        </option>
              <option value="3" >
          Cybersecurity        </option>
              <option value="5" >
          Data Science        </option>
              <option value="6" >
          Graphic Design        </option>
              <option value="7" >
          Mobile Development        </option>
              <option value="8" >
          Networking        </option>
              <option value="1" >
          Programming        </option>
              <option value="2" >
          Web Development        </option>
          </select>

    <label for="description">Course Description</label>
    <textarea id="description" name="description" rows="5" required></textarea>

    <label for="date">Date</label>
    <input id="date" name="date" type="datetime-local" value="" required>

    <label for="capacity">Capacity</label>
    <input id="capacity" name="capacity" type="number" min="1" value="" required>

    <label for="course_image">Image</label>
    <input id="course_image" name="course_image" type="text" value="html_and_css_for_beginners.jpg" required>

    <button class="btn" type="submit">Save Course</button>
    <a class="btn btn_secondary" href="admin.html">Cancel</a>
  </form>
</section>
    </main>
    <footer>
      <div class="left">&copy; 2026 Course Pal</div>
      <div class="right">support@coursepal.example</div>
    </footer>
    <script src="js/demo.js"></script>
  </body>
</html>
